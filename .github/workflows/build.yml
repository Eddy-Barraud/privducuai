name: Build SilicIA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: macos-26
    env:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGN_IDENTITY: ""
      DEVELOPMENT_TEAM: ""
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache Swift Package Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/iOS\ Deployment/
          ~/Library/Developer/Xcode/Archives/
          ~/Library/Developer/Xcode/iOS\ Simulator/
          ~/Library/Developer/Xcode/UserData/CodeSignatures/
        key: swift-packages-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          swift-packages-${{ runner.os }}-
    
    - name: Cache Derived Data
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/iOS\ Deployment/
          ~/Library/Developer/Xcode/Archives/
          ~/Library/Developer/Xcode/iOS\ Simulator/
          ~/Library/Developer/Xcode/UserData/CodeSignatures/
        key: derived-data-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          derived-data-${{ runner.os }}-
    
    - name: Select Xcode
      run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
    
    - name: Xcode Version
      run: xcodebuild -version
    
    - name: Build Debug
      run: |
        set -o pipefail
        xcodebuild \
          -project SilicIA.xcodeproj \
          -scheme SilicIA \
          -configuration Debug \
          -destination "generic/platform=macOS" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM="" \
          build | tee /tmp/build-debug.log
    
    - name: Build Release
      run: |
        set -o pipefail
        xcodebuild \
          -project SilicIA.xcodeproj \
          -scheme SilicIA \
          -configuration Release \
          -destination "generic/platform=macOS" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM="" \
          build | tee /tmp/build-release.log
    
    - name: Upload Build Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          /tmp/build-debug.log
          /tmp/build-release.log
