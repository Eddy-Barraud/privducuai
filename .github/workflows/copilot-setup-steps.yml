name: Build SilicIA copilot
jobs:
  copilot-setup-steps:
    runs-on: macos-26
    env:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGN_IDENTITY: ""
      DEVELOPMENT_TEAM: ""
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
    
    - name: Xcode Version
      run: xcodebuild -version
    
    - name: Build Debug
      run: |
        set -o pipefail
        xcodebuild \
          -project SilicIA.xcodeproj \
          -scheme SilicIA \
          -configuration Debug \
          -destination "generic/platform=macOS" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM="" \
          build | tee /tmp/build-debug.log
    
    - name: Upload Build Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          /tmp/build-debug.log
          /tmp/build-release.log
